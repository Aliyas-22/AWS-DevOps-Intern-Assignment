<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Internship Assignment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #b3413f 0%, #9c332f 55%, #7f2622 100%);
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }

  .card {
    background: #fdf6f0;
    border-radius: 24px;
    max-width: 560px;
    width: 100%;
    padding: 50px 45px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: -60px;
    right: -60px;
    width: 160px;
    height: 160px;
    background: #b3413f;
    border-radius: 50%;
    opacity: 0.12;
  }

  .card::after {
    content: "";
    position: absolute;
    bottom: -70px;
    left: -70px;
    width: 200px;
    height: 200px;
    background: #7f2622;
    border-radius: 50%;
    opacity: 0.1;
  }

  .badge {
    display: inline-block;
    background: #b3413f;
    color: #fdf6f0;
    font-size: 12px;
    letter-spacing: 1.5px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 999px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #7f2622;
    font-size: 34px;
    margin-bottom: 6px;
  }

  .subtitle {
    color: #a6605d;
    font-size: 15px;
    margin-bottom: 34px;
    font-weight: 300;
  }

  .info-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(127, 38, 34, 0.12);
    position: relative;
    z-index: 1;
  }

  .info-item:last-child {
    border-bottom: none;
  }

  .icon {
    width: 42px;
    height: 42px;
    min-width: 42px;
    border-radius: 12px;
    background: #b3413f;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fdf6f0;
    font-size: 18px;
  }

  .info-text .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #a6605d;
    font-weight: 500;
  }

  .info-text .value {
    font-size: 17px;
    color: #4a2320;
    font-weight: 500;
    margin-top: 2px;
  }

  footer {
    margin-top: 34px;
    text-align: center;
    font-size: 12px;
    color: #b3413f;
    letter-spacing: 0.5px;
    opacity: 0.75;
  }
</style>
</head>
<body>

  <div class="card">
    <span class="badge">DevOps Internship Assignment</span>
    <h1>Hello, I'm shiaikh Aliya Firdous </h1>
    <p class="subtitle">Deployed on NGINX &mdash; Amazon EC2</p>

    <ul class="info-list">
      <li class="info-item">
        <div class="icon">&#127891;</div>
        <div class="info-text">
          <div class="label">College</div>
          <div class="value">Aditya college of Engineeering Beed</div>
        </div>
      </li>
      <li class="info-item">
        <div class="icon">&#128218;</div>
        <div class="info-text">
          <div class="label">Branch</div>
          <div class="value">MCA master of computer Application</div>
        </div>
      </li>
      <li class="info-item">
        <div class="icon">&#9993;</div>
        <div class="info-text">
          <div class="label">Email</div>
          <div class="value">itz.aliya22@gmail.com</div>
        </div>
      </li>
      <li class="info-item">
        <div class="icon">&#128197;</div>
        <div class="info-text">
          <div class="label">Date</div>
          <div class="value" id="current-date"></div>
        </div>
      </li>
    </ul>

    <footer>Served via NGINX on AWS EC2</footer>
  </div>

  <script>
    const dateEl = document.getElementById('current-date');
    const today = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    dateEl.textContent = today.toLocaleDateString('en-US', options);
  </script>

</body>
</html>
